<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Human Design × Psychological Profile — Cross-System Schematic</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #08080f;
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    color: #ccc;
  }
  body {
    min-height: 100vh;
    padding: 36px 16px;
  }
  .header {
    text-align: center;
    margin-bottom: 28px;
  }
  .header .meta-top {
    font-size: 12px;
    letter-spacing: 6px;
    color: #555;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 5px;
    color: #d4a843;
    margin: 0;
  }
  .header .meta-bottom {
    font-size: 11px;
    letter-spacing: 4px;
    color: #444;
    margin-top: 8px;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 3px;
  }
  .legend-bar {
    width: 32px;
    height: 3px;
    border-radius: 1px;
  }
  .columns {
    display: flex;
    justify-content: space-between;
    max-width: 980px;
    margin: 0 auto 10px;
    padding: 0 16px;
  }
  .col-hd {
    font-size: 10px;
    letter-spacing: 4px;
    color: #d4a843;
    width: 300px;
  }
  .col-psych {
    font-size: 10px;
    letter-spacing: 4px;
    color: #7aa8c4;
    text-align: right;
    width: 260px;
  }
  .schematic-wrap {
    max-width: 980px;
    margin: 0 auto;
    position: relative;
  }
  svg { display: block; width: 100%; }
  .conn-path {
    cursor: pointer;
    fill: none;
  }
  .node-group {
    cursor: pointer;
  }
  .node-rect {
    transition: fill 0.2s, stroke 0.2s, stroke-width 0.2s;
  }
  .node-label {
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 600;
    letter-spacing: 2px;
    pointer-events: none;
  }
  .node-sub {
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    letter-spacing: 1px;
    pointer-events: none;
  }
  .tooltip {
    min-height: 130px;
    margin: 16px auto 0;
    max-width: 720px;
    padding: 22px 28px;
    background: rgba(255,255,255,0.02);
    border: 1px solid #1a1a2a;
    border-radius: 6px;
    transition: background 0.25s, border-color 0.25s;
  }
  .tooltip-section + .tooltip-section {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .tooltip-label {
    font-size: 10px;
    letter-spacing: 4px;
    margin-bottom: 10px;
  }
  .tooltip-desc {
    font-size: 15px;
    font-style: italic;
    color: #c8c8d8;
    line-height: 1.7;
  }
  .tooltip-card-title {
    font-size: 12px;
    letter-spacing: 4px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .tooltip-card-sub {
    font-size: 11px;
    letter-spacing: 2px;
    color: #555;
    margin-bottom: 14px;
    font-style: italic;
  }
  .tooltip-empty {
    font-size: 11px;
    letter-spacing: 3px;
    color: #2a2a3a;
    text-align: center;
    padding-top: 42px;
  }
  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 10px;
    letter-spacing: 3px;
    color: #222;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="meta-top">DRAGOS · MAY 17 1993 · CÂMPULUNG</div>
    <h1>HUMAN DESIGN × PSYCHOLOGICAL PROFILE</h1>
    <div class="meta-bottom">CROSS-SYSTEM SCHEMATIC</div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="columns">
    <div class="col-hd">HUMAN DESIGN</div>
    <div class="col-psych">PSYCHOLOGICAL PROFILE</div>
  </div>

  <div class="schematic-wrap">
    <svg id="schematic" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow" filterUnits="userSpaceOnUse" x="0" y="0" width="980" height="900">
          <feGaussianBlur stdDeviation="3" result="coloredBlur" />
          <feMerge>
            <feMergeNode in="coloredBlur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>
      <g id="connections"></g>
      <g id="hd-nodes"></g>
      <g id="psych-nodes"></g>
      <g id="highlights"></g>
    </svg>

    <div class="tooltip" id="tooltip">
      <div class="tooltip-empty" id="tooltip-empty">HOVER A LINE OR CLICK A CARD TO READ</div>
      <div id="tooltip-content" style="display:none;"></div>
    </div>
  </div>

  <div class="footer">
    RIGHT ANGLE CROSS OF CONTAGION · 8/14 · 30/29 · SINGLE DEFINITION
  </div>

<script>
const HD_NODES = [
  { id: "manifestor", label: "MANIFESTOR", sub: "Type", y: 0 },
  { id: "inform", label: "TO INFORM", sub: "Strategy", y: 1 },
  { id: "ego", label: "EGO MANIFESTED", sub: "Inner Authority", y: 2 },
  { id: "profile", label: "2 / 4", sub: "Hermit · Opportunist", y: 3 },
  { id: "channel", label: "CHANNEL 21–45", sub: "Material Will", y: 4 },
  { id: "gates", label: "GATES 29·30·48·61·63", sub: "Key Active Gates", y: 5 },
];

const PSYCH_NODES = [
  { id: "eval", label: "EVALUATION TERROR", sub: "Central Wound", y: 0 },
  { id: "stealth", label: "STEALTH REFLEX", sub: "Sentry · Visibility Wound", y: 1 },
  { id: "second", label: "SECOND-PLACE WOUND", sub: "Worth · Desire Eroded", y: 2 },
  { id: "dual", label: "SOLITUDE + NETWORK", sub: "Dual Structural Need", y: 3 },
  { id: "care", label: "CARETAKING TRAP", sub: "Relational Shadow", y: 4 },
  { id: "mind3am", label: "3AM MIND", sub: "Inner Truth · Doubt Loop", y: 5 },
  { id: "anger", label: "UNEXPRESSED ANGER", sub: "Signal Without Channel", y: 6 },
];

const CONNECTIONS = [
  {
    hd: "manifestor", psych: "eval",
    type: "tension",
    label: "CORE TENSION",
    desc: "Manifestors are built to initiate freely and impact without restriction. Evaluation Terror shuts down initiation at the exact point of expression — the wound lives inside the mechanism.",
  },
  {
    hd: "inform", psych: "stealth",
    type: "tension",
    label: "DIRECT CONFLICT",
    desc: "The Strategy requires visibility — informing others before acting. The Stealth Reflex learned that visibility = target. These point in exactly opposite directions.",
  },
  {
    hd: "ego", psych: "second",
    type: "tension",
    label: "UNDERMINED AUTHORITY",
    desc: "Ego Manifested means decisions should come from genuine heart-desire and self-worth. The Second-Place Wound lives in the same center — the authority keeps being told it isn't enough.",
  },
  {
    hd: "profile", psych: "dual",
    type: "mirror",
    label: "PERFECT MIRROR",
    desc: "Line 2 (Hermit) explains the solitude need, the 3am hours, the mountain freedom. Line 4 (Opportunist) explains the relational abundance — multiple deep friend groups, life moving through network.",
  },
  {
    hd: "channel", psych: "care",
    type: "mirror",
    label: "CHANNEL SHADOW",
    desc: "Channel 21–45 governs material mastery and 'what's mine is mine.' Its shadow is overextension into provision — becoming the floor others stand on rather than a person who stands beside them.",
  },
  {
    hd: "gates", psych: "mind3am",
    type: "mirror",
    label: "DIRECT EXPRESSION",
    desc: "Gate 61 is the inner pressure toward mystery — the 3am mind that won't quiet. Gate 63 is the doubt apparatus — the automatic pre-expression scan the profile calls the Sentry. Gate 48 is the fear of not being deep enough, not yet ready.",
  },
  {
    hd: "gates", psych: "anger",
    type: "mirror",
    label: "FREQUENCY MATCH",
    desc: "Gate 30 is emotional fire, longing, desire that can't fully resolve — melancholy as a native frequency. Gate 29 at its shadow says yes to everything and becomes the resource others drain.",
  },
  {
    hd: "manifestor", psych: "anger",
    type: "amplify",
    label: "CAUSAL LINK",
    desc: "Manifestor Not-Self Anger is specifically the biological signal of blocked initiation. The calibrated, internal, nowhere-to-go anger in the profile is not just emotional — it's the type responding to structural obstruction.",
  },
];

const TYPE_STYLES = {
  tension: { stroke: "#e74c3c", label: "#ff6b5e", bg: "rgba(231,76,60,0.14)" },
  mirror:  { stroke: "#e8c44e", label: "#f5d54e", bg: "rgba(232,196,78,0.14)" },
  amplify: { stroke: "#5b8dee", label: "#7fb3f5", bg: "rgba(91,141,238,0.14)" },
};

// === Sizing ===
const NODE_H = 80;
const NODE_W = 260;
const V_GAP = 100;
const LEFT_X = 40;
const SVG_W = 980;
const RIGHT_X = SVG_W - LEFT_X - NODE_W;  // 680
const PSYCH_ROWS = 7;
const HD_ROWS = 6;
const SVG_H = Math.max(HD_ROWS, PSYCH_ROWS) * V_GAP + 80;

const SVG_NS = "http://www.w3.org/2000/svg";

function nodeY(index) { return 40 + index * V_GAP; }
function hdCenter(node) { return { x: LEFT_X + NODE_W, y: nodeY(node.y) + NODE_H / 2 }; }
function psychCenter(node) { return { x: RIGHT_X, y: nodeY(node.y) + NODE_H / 2 }; }
function bezierPath(x1, y1, x2, y2) {
  const cx = (x1 + x2) / 2;
  return `M ${x1} ${y1} C ${cx} ${y1}, ${cx} ${y2}, ${x2} ${y2}`;
}

// === State ===
let hoveredConn = null;     // index of connection being hovered
let selectedCard = null;    // id of card currently pressed (HD or psych)

// === Build legend ===
const legendEl = document.getElementById("legend");
[
  { type: "tension", label: "TENSION" },
  { type: "mirror",  label: "MIRROR" },
  { type: "amplify", label: "AMPLIFIES" },
].forEach(({ type, label }) => {
  const item = document.createElement("div");
  item.className = "legend-item";
  item.style.color = TYPE_STYLES[type].label;
  const bar = document.createElement("div");
  bar.className = "legend-bar";
  bar.style.background = TYPE_STYLES[type].stroke;
  item.appendChild(bar);
  item.appendChild(document.createTextNode(label));
  legendEl.appendChild(item);
});

// === Set viewBox ===
document.getElementById("schematic").setAttribute("viewBox", `0 0 ${SVG_W} ${SVG_H}`);

// === Build connections (base + highlight twins) ===
const connG = document.getElementById("connections");
const highlightG = document.getElementById("highlights");
const connPaths = [];
const highlightPaths = [];

CONNECTIONS.forEach((conn, i) => {
  const hdNode = HD_NODES.find(n => n.id === conn.hd);
  const psychNode = PSYCH_NODES.find(n => n.id === conn.psych);
  const a = hdCenter(hdNode);
  const b = psychCenter(psychNode);
  const style = TYPE_STYLES[conn.type];
  const d = bezierPath(a.x, a.y, b.x, b.y);

  // Base (always visible) path
  const path = document.createElementNS(SVG_NS, "path");
  path.setAttribute("d", d);
  path.setAttribute("stroke", style.stroke);
  path.setAttribute("stroke-width", "3");
  path.setAttribute("stroke-opacity", "0.85");
  path.setAttribute("fill", "none");
  path.setAttribute("class", "conn-path");
  path.addEventListener("mouseenter", () => { hoveredConn = i; updateView(); });
  path.addEventListener("mouseleave", () => { hoveredConn = null; updateView(); });
  connG.appendChild(path);
  connPaths.push(path);

  // Twin highlight path — drawn on top, only shown when conn is active
  const hl = document.createElementNS(SVG_NS, "path");
  hl.setAttribute("d", d);
  hl.setAttribute("stroke", style.stroke);
  hl.setAttribute("stroke-width", "6");
  hl.setAttribute("stroke-opacity", "1");
  hl.setAttribute("fill", "none");
  hl.setAttribute("filter", "url(#glow)");
  hl.setAttribute("pointer-events", "none");
  hl.setAttribute("visibility", "hidden");
  highlightG.appendChild(hl);
  highlightPaths.push(hl);
});

// === Build node helper ===
function buildNode(node, side) {
  const isHd = side === "hd";
  const x = isHd ? LEFT_X : RIGHT_X;
  const labelColor = isHd ? "#d4a843" : "#9ab8cc";
  const subColor = isHd ? "#7a6830" : "#2e5268";

  const g = document.createElementNS(SVG_NS, "g");
  g.setAttribute("class", "node-group");
  g.dataset.cardId = node.id;
  g.dataset.side = side;

  const rect = document.createElementNS(SVG_NS, "rect");
  rect.setAttribute("x", x);
  rect.setAttribute("y", nodeY(node.y));
  rect.setAttribute("width", NODE_W);
  rect.setAttribute("height", NODE_H);
  rect.setAttribute("rx", 5);
  rect.setAttribute("class", "node-rect");
  g.appendChild(rect);

  const t1 = document.createElementNS(SVG_NS, "text");
  t1.setAttribute("x", x + 18);
  t1.setAttribute("y", nodeY(node.y) + 32);
  t1.setAttribute("fill", labelColor);
  t1.setAttribute("font-size", "12");
  t1.setAttribute("class", "node-label");
  t1.textContent = node.label;
  g.appendChild(t1);

  const t2 = document.createElementNS(SVG_NS, "text");
  t2.setAttribute("x", x + 18);
  t2.setAttribute("y", nodeY(node.y) + 54);
  t2.setAttribute("fill", subColor);
  t2.setAttribute("font-size", "11");
  t2.setAttribute("class", "node-sub");
  t2.textContent = node.sub;
  g.appendChild(t2);

  // Click toggles selection
  g.addEventListener("click", () => {
    selectedCard = (selectedCard === node.id) ? null : node.id;
    updateView();
  });

  return { group: g, rect };
}

// === Build HD nodes ===
const hdG = document.getElementById("hd-nodes");
const hdRects = {};
HD_NODES.forEach(node => {
  const { group, rect } = buildNode(node, "hd");
  hdG.appendChild(group);
  hdRects[node.id] = rect;
});

// === Build Psych nodes ===
const psychG = document.getElementById("psych-nodes");
const psychRects = {};
PSYCH_NODES.forEach(node => {
  const { group, rect } = buildNode(node, "psych");
  psychG.appendChild(group);
  psychRects[node.id] = rect;
});

// === Tooltip elements ===
const tooltipEl = document.getElementById("tooltip");
const tooltipEmpty = document.getElementById("tooltip-empty");
const tooltipContent = document.getElementById("tooltip-content");

// === Style helpers for nodes ===
function styleHdRect(rect, level) {
  // level: 0 = idle, 1 = related (lit by hover/selection), 2 = selected card itself
  if (level === 2) {
    rect.setAttribute("fill", "rgba(212,168,67,0.20)");
    rect.setAttribute("stroke", "#d4a843");
    rect.setAttribute("stroke-width", "2");
  } else if (level === 1) {
    rect.setAttribute("fill", "rgba(212,168,67,0.13)");
    rect.setAttribute("stroke", "#d4a843");
    rect.setAttribute("stroke-width", "1.5");
  } else {
    rect.setAttribute("fill", "rgba(212,168,67,0.04)");
    rect.setAttribute("stroke", "#2a2415");
    rect.setAttribute("stroke-width", "1");
  }
}
function stylePsychRect(rect, level) {
  if (level === 2) {
    rect.setAttribute("fill", "rgba(122,168,196,0.20)");
    rect.setAttribute("stroke", "#7aa8c4");
    rect.setAttribute("stroke-width", "2");
  } else if (level === 1) {
    rect.setAttribute("fill", "rgba(122,168,196,0.13)");
    rect.setAttribute("stroke", "#7aa8c4");
    rect.setAttribute("stroke-width", "1.5");
  } else {
    rect.setAttribute("fill", "rgba(122,168,196,0.04)");
    rect.setAttribute("stroke", "#152030");
    rect.setAttribute("stroke-width", "1");
  }
}

// === Render based on state ===
function updateView() {
  // Determine which connection indices are "active" (highlighted)
  let activeConnIndices = [];
  if (hoveredConn !== null) {
    activeConnIndices = [hoveredConn];
  } else if (selectedCard !== null) {
    CONNECTIONS.forEach((c, idx) => {
      if (c.hd === selectedCard || c.psych === selectedCard) activeConnIndices.push(idx);
    });
  }

  // Update highlight paths
  highlightPaths.forEach((hl, idx) => {
    hl.setAttribute("visibility", activeConnIndices.includes(idx) ? "visible" : "hidden");
  });

  // Compute card highlight levels
  // level 2 = the selected card itself
  // level 1 = a card connected to the active set
  HD_NODES.forEach(node => {
    let level = 0;
    if (selectedCard === node.id) level = 2;
    else if (activeConnIndices.some(idx => CONNECTIONS[idx].hd === node.id)) level = 1;
    styleHdRect(hdRects[node.id], level);
  });
  PSYCH_NODES.forEach(node => {
    let level = 0;
    if (selectedCard === node.id) level = 2;
    else if (activeConnIndices.some(idx => CONNECTIONS[idx].psych === node.id)) level = 1;
    stylePsychRect(psychRects[node.id], level);
  });

  // Update tooltip
  if (hoveredConn !== null) {
    showConnectionTooltip(CONNECTIONS[hoveredConn]);
  } else if (selectedCard !== null) {
    showCardTooltip(selectedCard);
  } else {
    showEmptyTooltip();
  }
}

function showConnectionTooltip(conn) {
  const style = TYPE_STYLES[conn.type];
  tooltipEl.style.background = style.bg;
  tooltipEl.style.borderColor = style.stroke;
  tooltipEmpty.style.display = "none";
  tooltipContent.style.display = "block";
  tooltipContent.innerHTML = `
    <div class="tooltip-section">
      <div class="tooltip-label" style="color:${style.label};">${conn.label}</div>
      <div class="tooltip-desc">${escapeHtml(conn.desc)}</div>
    </div>
  `;
}

function showCardTooltip(cardId) {
  const isHd = HD_NODES.some(n => n.id === cardId);
  const cardNode = (isHd ? HD_NODES : PSYCH_NODES).find(n => n.id === cardId);
  const accent = isHd ? "#d4a843" : "#7aa8c4";
  const bgTint = isHd ? "rgba(212,168,67,0.08)" : "rgba(122,168,196,0.08)";
  const related = CONNECTIONS.filter(c => c.hd === cardId || c.psych === cardId);

  tooltipEl.style.background = bgTint;
  tooltipEl.style.borderColor = accent;
  tooltipEmpty.style.display = "none";
  tooltipContent.style.display = "block";

  const sectionsHtml = related.length === 0
    ? `<div class="tooltip-desc" style="opacity:0.7;">No connections mapped for this node.</div>`
    : related.map(c => {
        const s = TYPE_STYLES[c.type];
        return `
          <div class="tooltip-section">
            <div class="tooltip-label" style="color:${s.label};">${c.label}</div>
            <div class="tooltip-desc">${escapeHtml(c.desc)}</div>
          </div>
        `;
      }).join("");

  tooltipContent.innerHTML = `
    <div class="tooltip-card-title" style="color:${accent};">${escapeHtml(cardNode.label)}</div>
    <div class="tooltip-card-sub">${escapeHtml(cardNode.sub)}</div>
    ${sectionsHtml}
  `;
}

function showEmptyTooltip() {
  tooltipEl.style.background = "rgba(255,255,255,0.02)";
  tooltipEl.style.borderColor = "#1a1a2a";
  tooltipEmpty.style.display = "block";
  tooltipContent.style.display = "none";
  tooltipContent.innerHTML = "";
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// Initial paint
updateView();
</script>
</body>
</html>
